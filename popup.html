<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>X Auto Translate</title>
    <style>
      body {
        min-width: 260px;
        margin: 0;
        padding: 14px;
        color: #0f1419;
        font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      p {
        margin: 8px 0 0;
        color: #536471;
        font-size: 12px;
      }

      button {
        width: 100%;
        margin-top: 10px;
        padding: 8px 10px;
        border: 0;
        border-radius: 6px;
        background: #0f1419;
        color: #fff;
        font: inherit;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      dl {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px 12px;
        margin: 12px 0 0;
        padding-top: 10px;
        border-top: 1px solid #eff3f4;
      }

      dt,
      dd {
        margin: 0;
        font-size: 12px;
      }

      dt {
        color: #536471;
      }

      dd {
        color: #0f1419;
        font-variant-numeric: tabular-nums;
      }

      label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 9px 0;
        border-top: 1px solid #eff3f4;
      }

      label:first-of-type {
        border-top: 0;
      }

      section {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid #eff3f4;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      .credential-field {
        display: block;
        padding: 5px 0;
        border: 0;
        color: #536471;
        font-size: 12px;
      }

      .credential-field input {
        box-sizing: border-box;
        width: 100%;
        margin-top: 4px;
        padding: 7px 8px;
        border: 1px solid #cfd9de;
        border-radius: 6px;
        color: #0f1419;
        font: inherit;
      }

      .button-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }

      .button-row button {
        padding-inline: 5px;
      }

      .secondary-button {
        background: #536471;
      }

      .danger-button {
        background: #b42318;
      }
    </style>
  </head>
  <body>
    <h1>X Auto Translate</h1>
    <label>
      <span>自动展开帖子</span>
      <input type="checkbox" checked disabled>
    </label>
    <label>
      <span>详情页后台翻译</span>
      <input type="checkbox" checked disabled>
    </label>
    <p>打开 X 网页后，插件会在帖子进入视口附近时处理，并用非激活详情页获取 X 自带译文。</p>
    <p id="currentPage">当前页：检测中...</p>
    <button id="probeCurrentPage" type="button">检测当前 X 页面</button>
    <section aria-labelledby="tencentHeading">
      <h2 id="tencentHeading">腾讯云机器翻译</h2>
      <label class="credential-field">
        SecretId
        <input id="tencentSecretId" type="text" autocomplete="off" spellcheck="false">
      </label>
      <label class="credential-field">
        SecretKey
        <input id="tencentSecretKey" type="password" autocomplete="new-password" spellcheck="false">
      </label>
      <label class="credential-field">
        地域
        <input id="tencentRegion" type="text" value="ap-guangzhou" autocomplete="off" spellcheck="false">
      </label>
      <div class="button-row">
        <button id="tencentSave" type="button">保存</button>
        <button id="tencentTest" class="secondary-button" type="button">测试</button>
        <button id="tencentDelete" class="danger-button" type="button">删除</button>
      </div>
      <p id="tencentStatus" role="status">配置状态：检测中...</p>
      <p>凭证仅保存在本机扩展存储中；测试会翻译一条短句并消耗少量额度。</p>
    </section>
    <dl>
      <dt>已展开</dt>
      <dd id="expanded">0</dd>
      <dt>已请求</dt>
      <dd id="requested">0</dd>
      <dt>已翻译</dt>
      <dd id="translated">0</dd>
      <dt>已跳过</dt>
      <dd id="skipped">0</dd>
      <dt>失败</dt>
      <dd id="failed">0</dd>
      <dt>最近事件</dt>
      <dd id="lastEvent">-</dd>
      <dt>版本</dt>
      <dd id="version">-</dd>
      <dt>页面状态</dt>
      <dd id="pageStatus">-</dd>
      <dt>帖子/译文</dt>
      <dd id="pageCounts">-</dd>
    </dl>
    <script src="popup.js"></script>
  </body>
</html>
